# Alembic configuration for Meal Decider.
#
# The database URL is intentionally NOT set here. Both the CLI (via migrations/env.py)
# and the app's startup upgrade resolve it from the same get_database_url() helper in
# main.py, so environment variables (DATABASE_URL, POSTGRES_URL, ...) stay the single
# source of truth.

[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
